name: Build and publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts

      - name: Build packages
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p debs
          mv ../*.deb debs/

      - name: List packages
        run: ls -lh debs/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rockchip-settings-debs
          path: debs/
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(dpkg-parsechangelog -S Version)
          TAG="v${VERSION//\~/-}"
          gh release create "${TAG}" debs/*.deb \
            --title "ubuntu-rockchip-settings ${VERSION}" \
            --notes "Settings and meta-packages for questing" \
            --repo ${{ github.repository }} || true

      - name: Ingest into apt repo
        env:
          GH_TOKEN: ${{ secrets.APT_REPO_TOKEN }}
        run: |
          VERSION=$(dpkg-parsechangelog -S Version)
          TAG="v${VERSION//\~/-}"
          for deb in debs/*.deb; do
            FILENAME=$(basename "${deb}")
            DEB_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${FILENAME}"
            gh workflow run ingest.yml \
              --repo clsx524/ubuntu-rockchip-apt \
              --field deb_url="${DEB_URL}" \
              --field suite=questing
          done
